<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RFID Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #scanInput {
      position: absolute;
      opacity: 0;
    }

    #container {
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 30px;
    }

    #result {
      background: #1f2937;
      padding: 30px;
      border-radius: 16px;
      transition: 0.3s;
    }

    #name {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #phone {
      font-size: 18px;
      color: #9ca3af;
    }

    #status {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    /* -----------------------------
       REGISTER FORM
    ----------------------------- */
    #registerForm {
      display: none;
      margin-top: 20px;
    }

    #registerForm input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    #registerForm button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #registerForm button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <!-- HIDDEN INPUT FOR RFID -->
  <input id="scanInput" type="text" autofocus autocomplete="off" />

  <div id="container">

    <h1>RFID Check-In</h1>

    <div id="result">
      <h2 id="name">Scan RFID Bracelet</h2>
      <p id="phone"></p>
      <p id="status"></p>
    </div>

    <!-- 🔥 REGISTER FORM -->
    <div id="registerForm">
      <h3>Register New Student</h3>

      <input id="firstName" placeholder="First Name" />
      <input id="lastName" placeholder="Last Name" />
      <input id="phoneInput" placeholder="Phone Number" />

      <button id="saveBtn">Save Student</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
